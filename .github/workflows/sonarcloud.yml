# SonarCloud CI Configuration

name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    Docker:
      image: sonarsource/sonarcloud-scan:latest
    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Setup SonarCloud
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        with:
          projectKey: 'YOUR_PROJECT_KEY'  # TODO: Update with your project key
          organization: 'YOUR_ORGANIZATION'  # TODO: Update with your organization

      # Step 3: Execute SonarCloud Analysis
      - name: Execute SonarCloud Analysis
        run: |
          sonar-scanner -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
